syntax = "proto3";

package mesh.v1;

service MeshControl {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc IngestSignal(IngestSignalRequest) returns (IngestSignalResponse);
  rpc RunProfile(RunProfileRequest) returns (RunProfileResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string message = 2;
}

message IngestSignalRequest {
  string request_id = 1;
  string config_path = 2;
  string router_log = 3;
  string event_json = 4;
}

message IngestSignalResponse {
  bool ok = 1;
  string request_id = 2;
  string message = 3;
  int32 return_code = 4;
}

message RunProfileRequest {
  string request_id = 1;
  string profile = 2;
  string config_path = 3;
  string profile_log = 4;
}

message RunProfileResponse {
  bool ok = 1;
  string request_id = 2;
  string message = 3;
  int32 return_code = 4;
}
